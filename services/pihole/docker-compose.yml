# Pi-hole — Network-wide ad blocker & DNS server
# More info: https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
#
# DNS ports are bound to the Tailscale interface IP (100.86.157.64) so that
# Pi-hole acts as the DNS resolver only for Tailscale-connected clients.
# Replace 100.86.157.64 with your actual Tailscale IP if it differs.
#
# Copy .env.example to .env and set PIHOLE_PASSWORD before starting.
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      # DNS — TCP & UDP (Tailscale interface only)
      - "${TAILSCALE_IP:-100.86.157.64}:53:53/tcp"
      - "${TAILSCALE_IP:-100.86.157.64}:53:53/udp"
      # Web admin UI
      - "${TAILSCALE_IP:-100.86.157.64}:8080:80/tcp"
    environment:
      TZ: "Asia/Kolkata"
      # Web interface password — must be set in .env (PIHOLE_PASSWORD=your_password)
      FTLCONF_webserver_api_password: "${PIHOLE_PASSWORD:?PIHOLE_PASSWORD must be set in .env}"
      # Required when using Docker's default bridge network
      FTLCONF_dns_listeningMode: "ALL"
    volumes:
      # Persist Pi-hole databases and configuration
      - ./etc-pihole:/etc/pihole
      # Uncomment if you have custom dnsmasq config files (also set
      # FTLCONF_misc_etc_dnsmasq_d: 'true' in environment above).
      # Needed when upgrading from Pi-hole v5 → v6 for the first start only.
      # - ./etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      # Required for Pi-hole DHCP server (remove if not using DHCP)
      - NET_ADMIN
      # Required for Pi-hole to act as an NTP client and set host system time
      - SYS_TIME
      # Optional: give Pi-hole slightly higher CPU scheduling priority
      - SYS_NICE
    restart: unless-stopped
